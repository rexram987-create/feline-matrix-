<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>מטריצת החתוליים | The Feline Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-body: #030712; --bg-card: #0a1122; --bg-pill: #132342; --border-card: #1d365d; --text-accent: #f59e0b; }
        body { background-color: var(--bg-body); color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); line-height: 1.6; transition: all 0.3s ease; }
        .category-card { background-color: var(--bg-card); border: 1px solid var(--border-card); transition: all 0.3s ease; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); }
        .category-card:hover { border-color: rgba(255, 255, 255, 0.2); transform: translateY(-2px); box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.8); }
        .intro-box { background-color: var(--bg-card); border: 1px solid var(--border-card); border-radius: 2.5rem; box-shadow: 0 15px 35px -10px rgba(0,0,0,0.6); border-right: 4px solid var(--text-accent); }
        [dir="ltr"] .intro-box { border-right: 1px solid var(--border-card); border-left: 4px solid var(--text-accent); }
        .quote-pill { background-color: var(--bg-pill); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-img-container { width: 85px; height: 85px; flex-shrink: 0; border-radius: 1.2rem; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); background-color: var(--bg-body); }
        .card-img-container img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative px-4 md:px-8">

    <header class="pt-10 pb-8 max-w-5xl mx-auto w-full relative z-10">
        <div class="flex justify-between items-center w-full mb-8">
            <button onclick="toggleLanguage()" id="langBtn" class="bg-slate-900/80 backdrop-blur border border-white/10 px-6 py-2.5 rounded-full text-xs font-bold text-amber-500 hover:bg-amber-600 hover:text-white transition-all shadow-lg active:scale-95">EN</button>
            <a href="about.html" id="topAboutBtn" class="bg-slate-900/80 backdrop-blur border border-white/10 px-6 py-2.5 rounded-full text-xs font-bold text-slate-300 hover:text-white transition-all shadow-lg active:scale-95">אודות</a>
        </div>
        <div class="text-center">
            <div class="inline-block px-4 py-1.5 mb-6 text-[10px] font-bold tracking-widest text-amber-500 uppercase bg-amber-900/20 rounded-full border border-amber-800/30">Zoological & Evolutionary Research</div>
            <h1 id="mainTitle" class="text-4xl md:text-5xl font-black mb-4 text-white tracking-tight">מטריצת <span class="text-amber-500">החתוליים</span></h1>
            <p id="mainSub" class="text-slate-400 text-sm md:text-base max-w-lg mx-auto leading-relaxed"></p>
        </div>
    </header>

    <main class="flex-grow container mx-auto max-w-5xl relative z-10">
        <section class="mb-12 intro-box p-6 md:p-8 max-w-3xl mx-auto" id="introBox">
            <h2 id="introTitle" class="text-xl md:text-2xl font-bold text-amber-500 mb-5 pb-2 inline-flex items-center"></h2>
            <div id="introContent" class="space-y-6 text-slate-300 leading-relaxed text-sm md:text-base text-justify">
                <p id="p1"></p>
                <div class="quote-pill p-5 rounded-2xl"><p class="text-sm text-slate-300" id="p2"></p></div>
            </div>
        </section>

        <section class="mb-16">
            <h2 id="catHeader" class="text-xs font-bold text-slate-500 uppercase tracking-[0.2em] mb-6 pl-2 text-center md:text-start">קטלוג החתוליים המלא</h2>
            
            <!-- הקסם קורה כאן: הרשימה ריקה, ה-JS ימלא אותה! -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5" id="catsGrid">
                <!-- הכרטיסיות יוזרקו לכאן דינמית -->
            </div>
        </section>
    </main>

    <footer class="mt-auto border-t border-white/5 pt-12 pb-16 text-center px-6 bg-[#02050c]">
        <div class="flex justify-center items-center space-x-12 space-x-reverse mb-10">
            <a href="index.html" class="flex flex-col items-center text-amber-500 transition-transform active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                <span class="text-[10px] mt-1 font-bold tracking-widest" id="navHome">בית</span>
            </a>
            <a href="about.html" class="flex flex-col items-center text-slate-500 hover:text-amber-400 transition-transform active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <span class="text-[10px] mt-1 tracking-widest" id="navAbout">אודות</span>
            </a>
        </div>
        <p id="footerText" class="text-slate-500 text-xs max-w-md mx-auto leading-relaxed mb-4"></p>
        <div class="text-[9px] text-slate-700 uppercase tracking-[0.4em]">© 2026 The Feline Matrix | S25 Ultra</div>
    </footer>

    <!-- טעינת הנתונים והסקריפט המייצר -->
    <script src="data.js"></script>
    <script>
        function renderCats() {
            const grid = document.getElementById('catsGrid');
            grid.innerHTML = ''; // מנקה את הגריד
            
            // עובר על כל החתולים שהוגדרו ב-data.js ומייצר להם כפתור
            catsData.forEach(cat => {
                const title = currentLang === 'he' ? cat.nameHe : cat.nameEn;
                const cardHtml = `
                <a href="${cat.link}" class="category-card p-4 rounded-3xl flex items-center space-x-4 space-x-reverse group hover:border-[${cat.color}]">
                    <div class="card-img-container ml-4"><img src="${cat.img}" alt="${title}" onerror="this.src='https://via.placeholder.com/150/0a1122/${cat.color.replace('#','')}?text=🐾'"></div>
                    <div><h3 class="font-bold text-lg text-white">${title}</h3><p class="text-[10px] text-slate-500 font-mono mt-1">${cat.scientific}</p></div>
                </a>
                `;
                grid.innerHTML += cardHtml;
            });
        }

        // דריסה (החלפה) של פונקציית החלפת השפה מ-data.js כדי שתרנדר גם את החתולים מחדש
        const originalToggle = window.toggleLanguage;
        window.toggleLanguage = function() {
            if(typeof originalToggle === 'function') originalToggle(); // מפעיל את העדכון של הכותרות
            renderCats(); // מצייר מחדש את החתולים בשפה הנכונה
        }

        // ציור ראשוני
        setTimeout(renderCats, 100);
    </script>
</body>
</html>
