<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מטריצת החתוליים | The Feline Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        cardBg: '#1e293b',
                        accent: '#f59e0b' /* צבע זהב/ענבר מותאם לחתוליים */
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            line-height: 1.7;
            background: radial-gradient(circle at top right, #1e293b, #020617);
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        /* עיצוב כרטיסיות החתולים - פרימיום ריבועי מבוסס אטלס המדינות */
        .cat-card {
            @apply relative flex flex-col items-center justify-center h-40 bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700 rounded-[1.5rem] p-4 text-center transition-all duration-300 overflow-hidden shadow-[0_8px_15px_rgba(0,0,0,0.4)];
        }
        .cat-card:hover, .cat-card:active {
            @apply border-accent shadow-[0_0_25px_rgba(245,158,11,0.25)] -translate-y-2 bg-gradient-to-br from-slate-800 to-slate-950;
        }
        .cat-card::after {
            content: '';
            @apply absolute inset-0 bg-gradient-to-tr from-accent/0 via-accent/5 to-accent/0 opacity-0 transition-opacity duration-300 pointer-events-none;
        }
        .cat-card:hover::after, .cat-card:active::after {
            @apply opacity-100;
        }
    </style>
</head>
<body class="bg-darkBg text-slate-200 min-h-screen antialiased flex flex-col items-center p-4 sm:p-6 lg:p-10">
    
    <!-- כפתורי ניווט עליונים -->
    <div class="w-full max-w-5xl flex justify-between items-center mb-6 z-20">
        <button onclick="toggleLanguage()" id="langBtn" class="bg-slate-800/80 backdrop-blur border border-slate-600 px-6 py-2 rounded-full text-xs font-bold text-accent hover:bg-slate-700 transition-all shadow-lg active:scale-95">EN</button>
        <a href="about.html" id="topAboutBtn" class="bg-slate-800/80 backdrop-blur border border-slate-600 px-6 py-2 rounded-full text-xs font-bold text-slate-300 hover:text-white transition-all shadow-lg active:scale-95">אודות</a>
    </div>

    <!-- כותרת האתר ומטא-דאטה -->
    <header class="w-full max-w-5xl bg-cardBg/80 backdrop-blur-xl rounded-[2.5rem] shadow-2xl p-8 sm:p-12 mb-14 border border-slate-700 relative">
        
        <!-- אייקון טביעת רגל (מחליף את דגל ארה"ב) -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-24 h-24 mx-auto mb-8 text-accent drop-shadow-[0_10px_15px_rgba(245,158,11,0.3)]">
            <path d="M12 11.5c1.93 0 3.5-1.57 3.5-3.5S13.93 4.5 12 4.5 8.5 6.07 8.5 8s1.57 3.5 3.5 3.5zm-6.5-2c1.38 0 2.5-1.12 2.5-2.5S6.88 4.5 5.5 4.5 3 5.62 3 7s1.12 2.5 2.5 2.5zm13 0c1.38 0 2.5-1.12 2.5-2.5S19.88 4.5 18.5 4.5 16 5.62 16 7s1.12 2.5 2.5 2.5zm-5 4c-3.1 0-6 1.7-7.5 4.2C5.12 19.18 6.47 21 8.5 21h7c2.03 0 3.38-1.82 2.5-3.3C16.5 15.2 13.6 13.5 12 13.5z"/>
        </svg>

        <div class="text-center mb-10">
            <h1 class="text-4xl sm:text-5xl lg:text-6xl font-black text-white tracking-tight mb-4 drop-shadow-lg" id="mainTitle">
                מטריצת החתוליים
            </h1>
            <p class="text-accent text-xl sm:text-2xl font-black tracking-[0.2em] uppercase mb-4">
                Apex Predators
            </p>
            <div class="h-1.5 w-32 bg-accent mx-auto rounded-full mb-6 shadow-[0_0_10px_rgba(245,158,11,0.5)]"></div>
            <p class="text-slate-400 text-lg font-medium max-w-2xl mx-auto leading-relaxed" id="mainSub">
                מסע אבולוציוני וזואולוגי לחקר טורפי העל המרתקים ביותר בטבע - משפחת ה-Felidae.
            </p>
        </div>

        <!-- פסקת לאונרדו דה וינצ'י -->
        <div class="bg-slate-900/60 p-8 rounded-[2rem] border-r-4 border-accent shadow-inner">
            <h2 class="text-2xl font-black text-white mb-6 border-b border-slate-700 pb-3" id="introTitle">מכונת הציד המושלמת</h2>
            <div class="space-y-6 text-slate-300 text-lg leading-relaxed">
                <p id="p1"></p>
                <div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700/50">
                    <p class="text-accent font-medium italic" id="p2"></p>
                </div>
            </div>
        </div>
    </header>

    <!-- רשת החתולים (Grid מעוצב) -->
    <main class="w-full max-w-5xl flex-grow">
        <div class="flex items-center mb-8">
            <div class="w-2 h-8 bg-accent rounded-full mr-3 ml-4 shadow-[0_0_10px_rgba(245,158,11,0.8)]"></div>
            <h2 class="text-2xl font-black text-white" id="catHeader">
                קטלוג החתוליים המלא
            </h2>
        </div>
        
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-5 sm:gap-6 mb-16">
            
            <!-- כרטיס אריה -->
            <a href="cats/lion.html" class="cat-card group">
                <span class="text-slate-500 mb-2 transform transition-transform group-hover:scale-125 duration-500 text-4xl drop-shadow-md">🦁</span>
                <span class="text-lg font-black text-slate-300 group-hover:text-white tracking-wide z-10 relative" id="catLion">אריה</span>
                <span class="text-[10px] text-slate-500 font-mono mt-1 opacity-70 group-hover:text-accent transition-colors">Panthera leo</span>
            </a>
            
            <!-- כרטיס טיגריס -->
            <a href="cats/tiger.html" class="cat-card group">
                <span class="text-slate-500 mb-2 transform transition-transform group-hover:scale-125 duration-500 text-4xl drop-shadow-md">🐅</span>
                <span class="text-lg font-black text-slate-300 group-hover:text-white tracking-wide z-
